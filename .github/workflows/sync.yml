name: Sync game release calendar

on:
  schedule:
    - cron: '0 13 * * *'   # daily at 1pm UTC (~6am Pacific)
  workflow_dispatch: {}     # lets you click "Run workflow" manually to test

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python igdb_calendar_sync.py --output releases.ics
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.ics
          git diff --staged --quiet || git commit -m "Update release calendar"
          git push
